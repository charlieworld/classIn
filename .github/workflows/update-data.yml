name: Update data (daily)

on:
  schedule:
    # 18:00 UTC = 02:00 Asia/Taipei (next day). Runs once a day.
    - cron: '0 18 * * *'
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write # commit & push the refreshed data.json
  pages: write # needed because we call the reusable deploy workflow
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: 16

      # Pull the latest responses from the Google Sheet -> data/data.json
      - name: Fetch latest sheet data
        working-directory: data
        run: |
          yarn install --frozen-lockfile
          node factory.js

      - name: Commit data if it changed
        run: |
          if [ -n "$(git status --porcelain data/data.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/data.json
            git commit -m "[DATA] daily update"
            git push
          else
            echo "No data changes — skipping commit."
          fi

  # Rebuild & redeploy the site with the (possibly) updated data.
  deploy:
    needs: update
    uses: ./.github/workflows/deploy.yml
